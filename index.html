<!DOCTYPE html>
<html>
  <head>
    <title>Portfolio</title>
    <link rel="stylesheet" href="port_css.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    

  </head>
  <body>
    <header class="navbar">
    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav class="nav-links" id="nav-links">
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>
    <section class="hero" id="home">
    <div class="hero-img-wrap">
      <img
        src="front-shot.png"
        alt="Khalid Yaser"
        width="400"
        height="400"
        loading="lazy"
        class="hero-img"
      />
    </div>
    <div class="hero-text">
      <span class="hero-tag">Software Engineering Student</span>
      <h1>Hi, I'm<br>Khalid Yaser</h1>
      <p style="font-size: 20px;">I build things for the web. Currently studying software engineering and exploring full-stack development.</p>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Khalid Yaser</p>
  </footer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');

    hamburger.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', open);
    });

    navLinks.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
      });
    });

    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('form-success').hidden = false;
      e.target.reset();
    }
  </script>
  </body>
  
</html>
